name: JustRunMy 自动续期
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 */2 * *'
jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write
    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4
        with:
          repository: jyucoeng/auto-justrunmy-private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: 🛡️ 安装 Hysteria2 (可选)
        env:
          HY2_PROXY_URL: ${{ secrets.HY2_PROXY_URL }}
        run: |
          if [ -z "$HY2_PROXY_URL" ]; then
            echo "ℹ️ 未配置 HY2_PROXY_URL，将使用直连模式。"
          else
            echo "📡 安装 Hysteria2..."
            wget -q https://github.com/apernet/hysteria/releases/download/app%2Fv2.4.4/hysteria-linux-amd64 -O hysteria
            chmod +x hysteria
            sudo mv hysteria /usr/local/bin/
            echo "✅ Hysteria2 已安装"
          fi
          
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            xdotool \
            scrot \
            fonts-noto-cjk
            
      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase aiohttp requests
          seleniumbase install chromedriver
          
      - name: 🚀 运行续期脚本
        env:
          JUST_BATCH: ${{ secrets.JUST_BATCH }}
          HY2_PROXY_URL: ${{ secrets.HY2_PROXY_URL }}
        run: |
          python renew.py
            
      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
          
      - name: 🧹 清理旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
